<section id="view-legislation" class="view">
  <div class="view-header">
    <h2>Legislation</h2>
    <button class="btn btn-primary" id="btn-new-legislation">+ New Legislation</button>
  </div>
  <div class="table-container">
    <div class="table-toolbar">
      <input type="search" id="search-legislation" class="search-input" placeholder="Search legislation…">
    </div>
    <table id="table-legislation">
      <thead>
        <tr>
          <th class="th-sortable" data-col="title">Title</th>
          <th class="th-sortable" data-col="text">Text</th>
          <th>Sponsors</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody-legislation">
        <tr class="placeholder-row">
          <td colspan="4"><div class="spinner"></div></td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
